services:
  # ─── Infrastructure ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notetaker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notetaker_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ai_notetaker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notetaker} -d ${POSTGRES_DB:-ai_notetaker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin_secret};
      mc mb --ignore-existing local/meeting-audio;
      exit 0;
      "

  # ─── API Gateway ────────────────────────────────────
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "80:80"
    depends_on:
      - auth-svc
      - meeting-svc
      - transcript-svc
      - ai-svc
      - project-svc
      - task-svc

  # ─── Backend Microservices ──────────────────────────
  auth-svc:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  meeting-svc:
    build:
      context: .
      dockerfile: services/meeting/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-meeting-audio}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  transcript-svc:
    build:
      context: .
      dockerfile: services/transcript/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy

  ai-svc:
    build:
      context: .
      dockerfile: services/ai-processing/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy

  project-svc:
    build:
      context: .
      dockerfile: services/project/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy

  task-svc:
    build:
      context: .
      dockerfile: services/task/Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Celery Workers ────────────────────────────────
  ai-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    command: celery -A celery_app worker -Q ai -l info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin_secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  embedding-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    command: celery -A celery_app worker -Q embeddings -l info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-me}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  calendar-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    command: celery -A celery_app worker -Q calendar -l info -B --concurrency=1
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://notetaker:notetaker_secret@postgres:5432/ai_notetaker}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend ───────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-nextauth-secret}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:80}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:80}
    depends_on:
      - api-gateway

  # ─── Monitoring ─────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: workers/Dockerfile
    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/1}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
